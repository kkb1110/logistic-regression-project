<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Heart Disease Prediction</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }
      body {
        background: linear-gradient(135deg, #fdf2f2, #fff);
        padding: 40px 20px;
        color: #333;
      }
      .container {
        max-width: 1100px;
        margin: auto;
      }
      .card {
        background: #fff;
        border-radius: 24px;
        padding: 40px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
      }
      .title {
        text-align: center;
        margin-bottom: 10px;
        color: #d62828;
        font-size: 2rem;
        font-weight: 700;
      }
      .subtitle {
        text-align: center;
        color: #666;
        margin-bottom: 35px;
      }
      form {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 22px;
      }
      .input-group {
        display: flex;
        flex-direction: column;
      }
      .input-group label {
        font-size: 0.95rem;
        font-weight: 500;
        margin-bottom: 8px;
        color: #444;
      }
      .input-group input,
      .input-group select {
        padding: 14px 16px;
        border: 1px solid #ddd;
        border-radius: 12px;
        outline: none;
        font-size: 0.95rem;
        transition: 0.3s;
        background: #fafafa;
      }
      .input-group input:focus,
      .input-group select:focus {
        border-color: #d62828;
        box-shadow: 0 0 0 4px rgba(214, 40, 40, 0.1);
        background: #fff;
      }
      .full-width {
        grid-column: 1 / -1;
      }
      .submit-btn {
        grid-column: 1 / -1;
        padding: 16px;
        border: none;
        border-radius: 14px;
        background: #d62828;
        color: #fff;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 10px;
      }
      .submit-btn:hover {
        background: #b71c1c;
        transform: translateY(-2px);
      }
      .prediction-box {
        margin-top: 30px;
        padding: 20px;
        border-radius: 16px;
        background: #fff5f5;
        border: 1px solid #ffd6d6;
        text-align: center;
      }
      .prediction-box h3 {
        color: #d62828;
        margin-bottom: 10px;
      }
      .prediction-text {
        font-size: 1.1rem;
        font-weight: 600;
        color: #333;
      }
      @media (max-width: 768px) {
        .card {
          padding: 25px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h1 class="title">Heart Disease Prediction</h1>
        <p class="subtitle">
          Enter the patient details below to predict heart disease risk.
        </p>
        <form action="/predict" method="POST">
          <div class="input-group">
            <label>Age</label> <input type="number" name="age" required />
          </div>
          <div class="input-group">
            <label>Sex</label>
            <select name="sex" required>
              <option value="">Select</option>
              <option value="1">Male</option>
              <option value="0">Female</option>
            </select>
          </div>
          <div class="input-group">
            <label>Resting Blood Pressure (trestbps)</label>
            <input type="number" name="trestbps" required />
          </div>
          <div class="input-group">
            <label>Cholesterol Level (chol)</label>
            <input type="number" name="chol" required />
          </div>
          <div class="input-group">
            <label>Fasting Blood Sugar > 120 mg/dl</label>
            <select name="fbs" required>
              <option value="">Select</option>
              <option value="1">Yes</option>
              <option value="0">No</option>
            </select>
          </div>
          <div class="input-group">
            <label>Maximum Heart Rate Achieved (thalch)</label>
            <input type="number" name="thalch" required />
          </div>
          <div class="input-group">
            <label>Exercise Induced Angina</label>
            <select name="exang" required>
              <option value="">Select</option>
              <option value="1">Yes</option>
              <option value="0">No</option>
            </select>
          </div>
          <div class="input-group">
            <label>Oldpeak</label>
            <input type="number" step="0.1" name="oldpeak" required />
          </div>
          <div class="input-group">
            <label>Number of Major Vessels Colored by Fluoroscopy (ca)</label>
            <select name="ca" required>
              <option value="0">0</option>
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
            </select>
          </div>
          <div class="input-group">
            <label>Chest Pain Type</label>
            <select name="cp" required>
              <option value="">Select</option>
              <option value="asymptomatic">Asymptomatic</option>
              <option value="typical angina">Typical Angina</option>
              <option value="atypical angina">Atypical Angina</option>
              <option value="non-anginal">Non-Anginal Pain</option>
            </select>
          </div>
          <div class="input-group">
            <label>Resting ECG Result</label>
            <select name="restecg" required>
              <option value="">Select</option>
              <option value="lv hypertrophy">LV Hypertrophy</option>
              <option value="normal">Normal</option>
              <option value="st-t abnormality">ST-T Abnormality</option>
            </select>
          </div>
          <div class="input-group">
            <label>Slope of Peak Exercise ST Segment</label>
            <select name="slope" required>
              <option value="">Select</option>
              <option value="downsloping">Downsloping</option>
              <option value="flat">Flat</option>
              <option value="upsloping">Upsloping</option>
            </select>
          </div>
          <div class="input-group">
            <label>Thalassemia</label>
            <select name="thal" required>
              <option value="">Select</option>
              <option value="fixed defect">Fixed Defect</option>
              <option value="normal">Normal</option>
              <option value="reversable defect">Reversable Defect</option>
            </select>
          </div>
          <div class="input-group">
            <label>Where Are You From</label>
            <select name="data_origin" required>
              <option value="">Select</option>
              <option value="Cleveland">Cleveland</option>
              <option value="Hungary">Hungary</option>
              <option value="Switzerland">Switzerland</option>
              <option value="VA Long Beach">VA Long Beach</option>
            </select>
          </div>
          <button type="submit" class="submit-btn">
            Predict Heart Disease
          </button>
        </form>
        
      </div>
    </div>
  </body>
</html>
